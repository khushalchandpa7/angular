<div class="dashboard-container">
  <aside class="sidebar">
    <div class="logo">MyApp Admin</div>
    <nav class="nav-links">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Dashboard
      </a>
      <a routerLink="/dashboard/profile" routerLinkActive="active">Profile</a>
      <a routerLink="/dashboard/settings" routerLinkActive="active">Settings</a>
      <a class="logout-item" routerLinkActive="active">Logout</a>
    </nav>
  </aside>

  <main class="main-content">
    <header>
      <h1>Welcome back, Admin!</h1>
      <div class="user-info">
        <span>Admin User</span>
        <div class="avatar">A</div>
      </div>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>Total Users</h3>
        <p>1,245</p>
      </div>
      <div class="stat-card">
        <h3>Revenue</h3>
        <p>$12,450</p>
      </div>
      <div class="stat-card">
        <h3>Active Sessions</h3>
        <p>342</p>
      </div>
    </section>

    <section class="content-area">
      <h2>Recent Activity</h2>
      <div class="placeholder-box">
        <p>No recent activity to display. Chart or table goes here.</p>
      </div>
    </section>
  </main>
</div>

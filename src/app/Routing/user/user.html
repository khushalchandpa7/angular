<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header-bg"></div>
    <div class="profile-content">
      <img
        src="https://api.dicebear.com/7.x/notionists/svg?backgroundColor=00b894,55efc4"
        alt="Alex Johnson"
        class="profile-avatar"
      />
      <div class="profile-info">
        <h1 class="profile-name">{{ userData().name }}</h1>
        <span class="profile-role">{{ userData().role }}</span>
        <div class="profile-details">
          <p class="detail-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              ></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            {{ userData().email }}
          </p>
          <p class="detail-item">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            {{ userData().city }}
          </p>
        </div>
        <div class="profile-bio">
          <h3>About</h3>
          <p>
            Passionate about building scalable web applications and exploring the great outdoors.
          </p>
        </div>
      </div>
      <div class="profile-actions">
        <button routerLink="/home" class="btn">Go to Home</button>
      </div>
    </div>
  </div>
</div>
